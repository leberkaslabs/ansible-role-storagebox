---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    storagebox_mount_source: \\molecule.your-storagebox.de
    storagebox_mount_username: molecule
    storagebox_mount_password: molecule

  pre_tasks:
    - name: Update cache (Debian)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_os_family == "Debian"

  roles:
    - dudecalledbro.storagebox
