---
# Define the mount point for the storagebox
# This is where the storagebox will be mounted in the file system
storagebox_mount_path: /mnt/storagebox

# Define the owner of the storagebox mountpoint files
# The user who will have ownership over the mounted files
storagebox_mount_owner: root

# Define the group of the storagebox mountpoint files
# The group that will have access to the mounted files
storagebox_mount_group: root

# Define the path to store the storagebox credentials file
# This file will contain sensitive login details for mounting
storagebox_mount_credentials: /etc/storagebox-credentials.txt

# Define the storagebox mount source, username and password
# Format: '\\<username>.your-storagebox.de'
storagebox_mount_source: \\<username>.your-storagebox.de
storagebox_mount_username: <username>
storagebox_mount_password: <password>

# Define the mount options for the storagebox CIFS connection
# These options control the access and behavior of the mounted file system
storagebox_mount_options:
  # yamllint disable-line rule:quoted-strings
  - "credentials={{ storagebox_mount_credentials }}"
  - dir_mode=0770
  - file_mode=0660
  - iocharset=utf8
  - rw
